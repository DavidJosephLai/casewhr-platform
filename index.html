    <!-- 🛡️ 超早期安全防護 - 在所有腳本載入前執行 -->
    <script>
      // 🛡️ 第一道防線：立即攔截全局錯誤（在 React 載入前）
      (function() {
        'use strict';
        
        console.log('🛡️ [Security] Early protection layer activated');
        
        // 可疑來源列表
        const SUSPICIOUS_SOURCES = [
          'crawler.com',
          'newpublid',
          'dynamicid',
          'chrome-extension://',
          'moz-extension://',
          'safari-extension://',
        ];
        
        // 檢查是否為可疑來源
        function isSuspiciousSource(str) {
          if (!str) return false;
          const lowerStr = String(str).toLowerCase();
          return SUSPICIOUS_SOURCES.some(source => lowerStr.includes(source));
        }
        
        // 🛡️ 全局錯誤攔截器（捕獲階段，最早攔截）
        window.addEventListener('error', function(event) {
          const isSuspicious = 
            isSuspiciousSource(event.message) ||
            isSuspiciousSource(event.filename) ||
            isSuspiciousSource(event.error?.stack);
          
          if (isSuspicious) {
            console.warn('🛡️ [Security] Blocked suspicious error:', {
              message: event.message,
              filename: event.filename,
              source: 'Early Protection Layer'
            });
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            return false;
          }
        }, true); // 使用捕獲階段
        
        // 🛡️ Promise rejection 攔截器
        window.addEventListener('unhandledrejection', function(event) {
          const isSuspicious = 
            isSuspiciousSource(event.reason?.toString()) ||
            isSuspiciousSource(event.reason?.stack);
          
          if (isSuspicious) {
            console.warn('🛡️ [Security] Blocked suspicious promise rejection:', event.reason);
            event.preventDefault();
            return false;
          }
        });
        
        // 🛡️ 監控並移除可疑的 script 標籤
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            mutation.addedNodes.forEach(function(node) {
              if (node.nodeName === 'SCRIPT') {
                const src = node.src || '';
                const content = node.textContent || '';
                
                if (isSuspiciousSource(src) || isSuspiciousSource(content)) {
                  console.warn('🛡️ [Security] Removed suspicious script:', src || 'inline script');
                  node.remove();
                }
              }
            });
          });
        });
        
        // 開始監控 DOM 變化
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true
        });
        
        console.log('✅ [Security] Early protection layer ready');
      })();
    </script>
